# Waterloo MCP logging configuration for the VS Code stdio provider.
#
# This is the same basic logging setup as the main package, but kept local
# to the extension so the provider can ship a self-contained config set.

version = 1
disable_existing_loggers = false

[formatters.waterloo]
"()" = "sdv.doc.waterloo.mcp.wtrl_logging.GroupingFormatter"
fmt = "%(levelprefix)s WTRL %(message)s"
use_colors = false
timestamp_window = 0.5

[handlers.waterloo]
class = "logging.StreamHandler"
level = "WARNING"
formatter = "waterloo"
stream = "ext://sys.stderr"

[loggers."wtrl_mcp"]
level = "WARNING"
handlers = ["waterloo"]
propagate = false

[root]
level = "WARNING"
handlers = ["waterloo"]
